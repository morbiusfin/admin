<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d2e" />
  <title>MorbiusFin · Admin</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    .ad-wrap { max-width: 920px; margin: 0 auto; padding: calc(16px + var(--safe-top)) 14px 40px; }
    .ad-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .ad-brand { font-size: 21px; font-weight: 800; color: var(--accent); letter-spacing: -.4px; }
    .ad-brand small { display: block; font-size: 12px; color: var(--muted); font-weight: 700; letter-spacing: 0; }
    .ad-who { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    .ad-verpill { font-size: 11.5px; font-weight: 800; color: var(--accent); border: 1px solid var(--line); background: var(--card-2); border-radius: 999px; padding: 5px 12px; white-space: nowrap; }
    .ad-verpill[hidden] { display: none; }
    .ad-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 16px; }
    .ad-login { max-width: 380px; margin: 8vh auto 0; }
    .ad-field { display: block; margin-bottom: 12px; }
    .ad-field span { display: block; font-size: 12.5px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
    .ad-field input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; font-size: 16px; background: var(--card-2); color: var(--ink); font-family: var(--font); }
    .ad-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
    .btn { border: 0; border-radius: 12px; font-family: var(--font); font-weight: 800; font-size: 14px; padding: 12px 16px; cursor: pointer; width: 100%; }
    .btn.primary { background: linear-gradient(135deg, var(--green-2), var(--accent)); color: #fff; }
    .btn.ghost { background: var(--card-2); color: var(--ink); border: 1px solid var(--line); width: auto; }
    .btn.sm { padding: 8px 12px; font-size: 12.5px; border-radius: 10px; width: auto; }
    .btn:active { transform: scale(.97); }
    .ad-msg { min-height: 18px; font-size: 12.5px; font-weight: 700; color: var(--muted); margin: 8px 0; text-align: center; }
    .ad-msg.bad { color: var(--red); }
    .ad-msg.ok { color: var(--accent); }
    .ad-toolbar { display: flex; gap: 8px 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .ad-search { flex: 1 1 100%; min-width: 0; padding: 11px 14px; min-height: 44px; border: 1px solid var(--line); border-radius: 12px; font-size: 15px; background: var(--card-2); color: var(--ink); font-family: var(--font); }
    .ad-stat { font-size: 12.5px; color: var(--muted); flex: 1 1 auto; }
    .ad-toolbar .btn.sm { min-height: 40px; }
    .ad-trial { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; color: var(--muted); background: var(--card-2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-bottom: 12px; }
    .ad-trial b { color: var(--ink); }
    .ad-trial input { width: 64px; padding: 7px 9px; border: 1px solid var(--line); border-radius: 9px; background: var(--card); color: var(--ink); font-family: var(--font); font-size: 15px; font-weight: 800; text-align: center; }
    .ad-trial-msg { font-size: 12px; font-weight: 700; }
    .ad-trial-msg.ok { color: var(--accent, #15c266); }
    .ad-trial-msg.bad { color: var(--red); }
    .pl-intro { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .pl-card { border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; background: var(--card-2); }
    .pl-h { font-weight: 800; font-size: 15px; color: var(--ink); margin-bottom: 10px; }
    .pl-h .pl-id { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; margin-left: 6px; }
    .pl-fld { display: block; margin-bottom: 9px; }
    .pl-fld span { display: block; font-size: 12px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
    .pl-fld input { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--card); color: var(--ink); font-family: var(--font); font-size: 14px; }
    .pl-fld input:focus { outline: none; border-color: var(--accent); }
    .pl-save-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .pl-save-row .btn { width: auto; }
    .pl-note { font-size: 11.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
    .dz-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dz-tier { flex: 0 0 62px; font-weight: 800; font-size: 12.5px; color: var(--accent, #15c266); }
    .dz-price { flex: 0 0 96px; font-size: 12.5px; color: var(--muted); font-weight: 700; }
    .dz-link { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; background: var(--card); color: var(--ink); font-family: var(--font); font-size: 12.5px; }
    .acx-wrap { overflow-x: auto; margin: 4px 0 12px; }
    .acx-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .acx-tbl th, .acx-tbl td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--line); }
    .acx-tbl th { color: var(--muted); font-weight: 800; font-size: 12px; }
    .acx-tbl td.acx-flab { text-align: left; color: var(--ink); font-weight: 600; white-space: nowrap; }
    .acx-tbl input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent, #15c266); cursor: pointer; }
    .uf-list { display: flex; flex-direction: column; gap: 10px; margin: 4px 0 4px; }
    .uf-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13.5px; color: var(--ink); }
    .uf-row select { padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 13px; }
    .ad-rows { display: flex; flex-direction: column; gap: 10px; }
    .ad-row { background: var(--card-2); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 10px 14px; align-items: center; }
    .ad-name { font-weight: 800; font-size: 15px; color: var(--ink); word-break: break-word; }
    .ad-noname { color: var(--muted); font-weight: 600; font-style: italic; }
    .ad-email { font-weight: 600; font-size: 12.5px; color: var(--muted); word-break: break-all; margin-top: 1px; }
    .ad-tel { font-weight: 600; font-size: 12.5px; color: var(--muted); margin-top: 2px; }
    .ad-bell { font-size: 13px; vertical-align: middle; }
    .ad-bell.off { filter: grayscale(1); opacity: .55; }
    .ad-ref { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .ad-ref b { color: var(--ink); }
    .ad-reflink { border: 1px solid var(--line); background: var(--card-2); color: var(--accent-2); font-weight: 700; font-size: 11.5px; border-radius: 8px; padding: 2px 8px; cursor: pointer; }
    .ad-reflink:active { transform: scale(.96); }
    .ad-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    /* pill de dias restantes */
    .ad-dias { font-weight: 800; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .dias-ok { color: #4ade80; background: rgba(21,194,102,.14); }
    .dias-poucos { color: #fbbf24; background: rgba(251,191,36,.16); }
    .dias-venc { color: #ff6b6b; background: rgba(229,72,77,.16); }
    .dias-vit { color: #c084fc; background: rgba(168,85,247,.16); }
    /* plano EFETIVO: pago vencido → a pessoa está usando o Grátis agora (freemium) */
    .ad-efetivo { font-weight: 800; font-size: 11px; padding: 2px 8px; border-radius: 999px; color: #ffb454; background: rgba(255,148,32,.16); cursor: help; }
    /* conta conjunta: convidada (herda Ultimate do dono) = rosa · dona (tem convidados) = roxo */
    .ad-conj { font-weight: 800; font-size: 11px; padding: 2px 8px; border-radius: 999px; color: #ff9ec2; background: rgba(255,92,141,.16); cursor: help; }
    .ad-conj.own { color: #c4a7ff; background: rgba(124,58,237,.18); }
    /* abas Painel / Contas / Uso / Planos / Acessos / Descontos — barra ROLÁVEL na horizontal (nunca corta) */
    .ad-tabbar { position: relative; margin: 0 -14px 16px; }
    .ad-tabs {
      display: flex; gap: 8px; margin: 0; padding: 2px 14px 8px;
      overflow-x: auto; overflow-y: hidden; scroll-snap-type: x proximity;
      scroll-padding: 0 14px;   /* casa com o padding lateral — o snap "start" não ignora o respiro visual */
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .ad-tabs::-webkit-scrollbar { display: none; }
    .ad-tab {
      flex: 0 0 auto; scroll-snap-align: start; white-space: nowrap;
      background: var(--card-2); border: 1px solid var(--line); color: var(--muted);
      font-family: var(--font); font-weight: 800; font-size: 13.5px;
      padding: 11px 15px; min-height: 42px; border-radius: 12px; cursor: pointer;
      transition: background .15s ease, border-color .15s ease, color .15s ease, transform .12s ease;
    }
    .ad-tab.on { background: rgba(21,194,102,.16); border-color: rgba(21,194,102,.45); color: var(--accent, #15c266); box-shadow: 0 0 0 1px rgba(21,194,102,.12) inset; }
    .ad-tab:active { transform: scale(.96); }
    /* fade nas bordas indicando que a barra rola — só aparece quando há conteúdo cortado (classes via JS) */
    .ad-tabbar::before, .ad-tabbar::after {
      content: ""; position: absolute; top: 0; bottom: 8px; width: 22px; pointer-events: none;
      z-index: 2; opacity: 0; transition: opacity .2s ease;
    }
    .ad-tabbar::before { left: 0; background: linear-gradient(90deg, var(--card, #fff) 12%, transparent); }
    .ad-tabbar::after { right: 0; background: linear-gradient(270deg, var(--card, #fff) 12%, transparent); }
    .ad-tabbar.fade-l::before { opacity: 1; }
    .ad-tabbar.fade-r::after { opacity: 1; }
    /* dash de uso */
    .uso-card { margin-bottom: 14px; }
    .uso-h { font-weight: 800; font-size: 15px; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #usoReset { margin-left: auto; }
    .uso-sub { font-weight: 600; font-size: 11.5px; color: var(--muted); }
    .uso-chart { display: flex; align-items: flex-end; gap: 5px; height: 150px; padding-top: 8px; }
    .uso-bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 3px; min-width: 0; }
    .uso-bar-fill { width: 100%; max-width: 26px; background: linear-gradient(180deg, #19d17a, #15c266); border-radius: 6px 6px 0 0; min-height: 2px; transition: height .3s; }
    .uso-bar-n { font-size: 10px; font-weight: 800; color: var(--ink); height: 12px; }
    .uso-bar-d { font-size: 9px; color: var(--muted); white-space: nowrap; }
    /* ranking */
    .uso-rank { display: flex; flex-direction: column; gap: 8px; }
    .uso-rk { display: flex; align-items: center; gap: 10px; }
    .uso-rk-pos { width: 28px; text-align: center; font-weight: 800; font-size: 14px; color: var(--ink); flex: 0 0 auto; }
    .uso-rk-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .uso-rk-nome { font-weight: 700; font-size: 13.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .uso-rk-last { font-size: 10.5px; color: var(--muted); font-weight: 600; }
    .uso-rk-bar { height: 5px; border-radius: 999px; background: linear-gradient(90deg, #19d17a, #15c266); }
    .uso-rk-n { flex: 0 0 auto; font-weight: 800; font-size: 13px; color: var(--accent, #15c266); min-width: 28px; text-align: right; }
    /* popup unica: completar nome/telefone dos cadastros antigos */
    .fc-ov { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 18px; }
    .fc-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; max-width: 480px; width: 100%; max-height: 86vh; overflow: auto; overscroll-behavior: contain; }
    /* overlay aberto => trava o scroll do fundo; só o card da frente rola */
    body.ov-open { overflow: hidden; }
    .hp-card, .km-card { overscroll-behavior: contain; }
    .fc-h { font-weight: 800; font-size: 17px; color: var(--ink); }
    .fc-sub { font-size: 13px; color: var(--muted); margin: 6px 0 14px; }
    .fc-list { display: flex; flex-direction: column; gap: 12px; }
    .fc-row { display: flex; flex-direction: column; gap: 6px; border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
    .fc-em { font-size: 12.5px; color: var(--muted); word-break: break-all; }
    .fc-row input { padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 14px; }
    .fc-telwrap { display: flex; align-items: stretch; }
    .fc-telwrap .fc-ddi { display: flex; align-items: center; padding: 0 11px; border: 1px solid var(--line); border-right: 0; border-radius: 9px 0 0 9px; background: var(--card-2); color: var(--ink); font-weight: 800; font-size: 14px; white-space: nowrap; }
    .fc-telwrap .fc-tel { flex: 1; min-width: 0; border-top-left-radius: 0; border-bottom-left-radius: 0; }
    .fc-acts { display: flex; gap: 10px; margin-top: 16px; }
    .fc-acts .btn { flex: 1; }
    /* popup de notificação de despesas a vencer */
    .nt-card { position: relative; display: flex; flex-direction: column; overflow-y: auto; }   /* card rola inteiro (destinatário virou lista suspensa) */
    .nt-card .fc-acts { flex: 0 0 auto; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); background: var(--card); }
    .wn-x { position: absolute; top: 10px; right: 12px; width: 30px; height: 30px; border: 0; background: var(--card-2); color: var(--muted); border-radius: 9px; font-size: 15px; font-weight: 800; cursor: pointer; line-height: 1; }
    .wn-x:active { transform: scale(.94); }
    .nt-days { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; font-size: 13px; color: var(--muted); font-weight: 700; margin: 4px 0 12px; }
    .nt-days input { width: 70px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 16px; font-weight: 800; text-align: center; }
    .nt-all { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 8px; cursor: pointer; }
    .nt-all input, .nt-row input { width: 18px; height: 18px; accent-color: var(--accent, #15c266); flex: 0 0 auto; }
    .nt-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; }   /* área rolável = só a lista de contatos */
    .nt-row { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; cursor: pointer; }
    .nt-row:has(input:checked) { border-color: rgba(21,194,102,.5); background: rgba(21,194,102,.07); }
    .nt-mid { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .nt-nome { font-weight: 700; font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nt-em { font-size: 12px; color: var(--muted); word-break: break-all; }
    .nt-lbl { display: block; font-size: 12px; font-weight: 800; color: var(--muted); margin: 12px 0 5px; }
    .nt-titulo { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 14px; }
    .nt-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .nt-chip { border: 1px solid var(--line); background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 12.5px; font-weight: 700; padding: 7px 11px; border-radius: 999px; cursor: pointer; }
    .nt-chip:active { transform: scale(.96); }
    .nt-chip.on { border-color: rgba(21,194,102,.6); background: rgba(21,194,102,.14); color: var(--accent, #15c266); }
    .nt-chip-blank { border-style: dashed; }
    .nt-corpo { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 14px; line-height: 1.45; resize: vertical; min-height: 64px; }
    .nt-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 3px; }
    .nt-sel-wrap { position: relative; }
    .nt-sel-wrap::after { content: "▾"; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); font-size: 12px; }
    .nt-sel { width: 100%; padding: 12px 34px 12px 13px; border: 1px solid var(--line); border-radius: 11px; background: var(--card-2); color: var(--ink); font-family: var(--font); font-size: 14px; font-weight: 700; appearance: none; -webkit-appearance: none; cursor: pointer; }
    .nt-sel:focus { outline: none; border-color: rgba(21,194,102,.6); }
    .nt-sel-hint { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
    .nt-alvo-fix { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 11px; padding: 12px 13px; background: var(--card-2); color: var(--ink); font-size: 14px; font-weight: 700; word-break: break-all; }
    .ad-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .ad-controls select, .ad-controls input[type=date] { padding: 8px 10px; min-height: 40px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); font-family: var(--font); font-size: 13px; }
    .ad-controls .btn.sm { min-height: 40px; }
    .pill { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 999px; }
    .pill.ativo { background: rgba(21,194,102,.16); color: var(--accent); }
    .pill.bloqueado { background: rgba(229,72,77,.16); color: var(--red); }
    .tier { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; padding: 3px 10px 3px 6px; border-radius: 999px; }
    .tier img { width: 16px; height: 16px; object-fit: contain; display: block; }
    .tier-teste { background: rgba(245,166,35,.16); color: #f5a623; }
    .tier-plus { background: rgba(21,194,102,.16); color: #15c266; }
    .tier-pro { background: rgba(58,160,216,.16); color: #46b4ea; }
    .tier-ultimate { background: rgba(124,58,237,.18); color: #b59bf7; }
    .ad-row.row-teste { box-shadow: inset 4px 0 0 #f5a623; }
    .ad-row.row-plus { box-shadow: inset 4px 0 0 #15c266; }
    .ad-row.row-pro { box-shadow: inset 4px 0 0 #46b4ea; }
    .ad-row.row-ultimate { box-shadow: inset 4px 0 0 #7c3aed; }
    .ad-empty { text-align: center; color: var(--muted); padding: 30px 10px; }
    .ad-quick { display: flex; gap: 5px; }
    .ad-datelbl { display: flex; flex-direction: column; gap: 3px; font-size: 10px; font-weight: 800; color: var(--muted); }
    .pw-wrap { position: relative; display: block; width: 100%; }
    .pw-wrap input { width: 100%; padding-right: 44px !important; }
    .pw-eye { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: none; border: 0; padding: 0; color: var(--muted); cursor: pointer; }
    .pw-eye svg { display: block; }
    .ad-toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #06281c; font-weight: 800; font-size: 13.5px; padding: 11px 18px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 9999; max-width: 90vw; text-align: center; }
    .ad-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 560px) { .ad-row { grid-template-columns: 1fr; } .ad-controls { justify-content: flex-start; } }

    /* ===== Menu de opções (filtro/ordenação) — aba Contas ===== */
    .ad-menubar { display: flex; gap: 8px 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; padding: 10px 12px; background: var(--card-2); border: 1px solid var(--line); border-radius: 12px; }
    .ad-menubar .ad-mgroup { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .ad-menubar label { font-size: 11.5px; font-weight: 800; color: var(--muted); white-space: nowrap; flex: 0 0 auto; }
    .ad-menubar select { padding: 8px 10px; min-height: 36px; border: 1px solid var(--line); border-radius: 9px; background: var(--card); color: var(--ink); font-family: var(--font); font-size: 12.5px; font-weight: 700; cursor: pointer; min-width: 0; max-width: 100%; }
    .ad-menubar select:focus { outline: none; border-color: var(--accent); }
    .ad-mspacer { flex: 1 1 100%; height: 0; order: 3; }
    .ad-mcount { font-size: 12px; color: var(--muted); font-weight: 700; order: 4; margin-left: auto; }
    @media (max-width: 400px) {
      .ad-menubar { justify-content: space-between; }
      .ad-menubar .ad-mgroup { flex: 1 1 auto; }
      .ad-menubar select { width: 100%; }
    }

    /* ===== Seções de plano (agrupamento) — aba Contas ===== */
    .ad-groups { display: flex; flex-direction: column; gap: 16px; }
    .ad-group { display: flex; flex-direction: column; gap: 10px; }
    .ad-ghead { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px 8px; min-height: 44px; border-radius: 10px; user-select: none; -webkit-user-select: none; flex-wrap: wrap; row-gap: 4px; }
    .ad-ghead:active { background: var(--card-2); }
    .ad-ghead-bar { width: 5px; align-self: stretch; border-radius: 4px; flex: 0 0 auto; min-height: 22px; }
    .ad-ghead-tier { display: flex; align-items: center; gap: 7px; font-weight: 800; font-size: 15.5px; color: var(--ink); }
    .ad-ghead-tier img { width: 19px; height: 19px; object-fit: contain; }
    .ad-ghead-count { font-size: 12px; font-weight: 800; color: var(--muted); background: var(--card-2); border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; }
    .ad-ghead-sub { font-size: 11.5px; color: var(--muted); font-weight: 700; flex: 1 1 100%; padding-left: 15px; }
    .ad-ghead-sub .ok { color: var(--accent, #15c266); }
    .ad-ghead-sub .bad { color: var(--red); }
    .ad-ghead-chev { margin-left: auto; font-size: 12px; color: var(--muted); transition: transform .2s ease; flex: 0 0 auto; }
    .ad-group.closed .ad-ghead-chev { transform: rotate(-90deg); }
    .ad-group.closed .ad-rows { display: none; }
    .ad-group-empty { text-align: center; color: var(--muted); font-size: 12.5px; padding: 14px 10px; background: var(--card-2); border: 1px dashed var(--line); border-radius: 12px; }

    /* ===== Dashboard (aba Painel) ===== */
    /* mobile-first: 2 colunas fixas (nunca overflow em 380px); telas maiores ganham mais colunas */
    /* KPI compacto: emoji+label numa linha só no topo, NÚMERO grande dominando embaixo — menos espaço morto */
    .kpi-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (min-width: 480px) { .kpi-row { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 720px) { .kpi-row { grid-template-columns: repeat(auto-fit, minmax(112px, 1fr)); } }
    .kpi { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 13px; box-shadow: var(--shadow); min-width: 0; padding: 10px 11px 9px; }
    .kpi-top { display: flex; align-items: center; gap: 5px; min-height: 16px; }
    .kpi-emoji { font-size: 13px; line-height: 1; flex: 0 0 auto; }
    .kpi-lab { font-size: 9.5px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .25px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 18px; }
    .kpi-num { margin-top: 3px; font-size: 20px; font-weight: 800; letter-spacing: -.4px; line-height: 1.05; color: var(--ink); word-break: break-word; }
    .kpi.k-warn .kpi-num { color: var(--red); }
    .kpi.k-ok .kpi-num { color: var(--accent); }
    /* KPI clicável → abre a fila/lista da categoria */
    .kpi.kpi-click { cursor: pointer; transition: transform .12s ease, border-color .12s ease; }
    .kpi.kpi-click:hover { border-color: var(--accent); }
    .kpi.kpi-click:active { transform: scale(.97); }
    .kpi.kpi-click:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
    /* hero de KPIs de negócio (MRR/vitalícia/conversão/ticket médio) — levemente maior que os normais (é o topo da hierarquia) */
    .kpi-row.hero-row { margin-bottom: 10px; }
    .kpi.hero { background: linear-gradient(160deg, var(--card), var(--card-2)); border-color: rgba(21,194,102,.28); padding: 12px 12px 11px; }
    .kpi.hero .kpi-emoji { font-size: 14px; }
    .kpi.hero .kpi-lab { font-size: 10px; white-space: normal; padding-right: 20px; }
    .kpi.hero .kpi-num { font-size: 18px; margin-top: 4px; }
    /* botão "?" de ajuda — discreto no canto do card, alvo de toque confortável mesmo pequeno visualmente */
    .kpi-help {
      position: absolute; top: 7px; right: 7px; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--line); background: var(--card-2); color: var(--muted);
      border-radius: 50%; font-size: 10.5px; font-weight: 800; font-family: var(--font);
      cursor: pointer; line-height: 1; padding: 0; z-index: 3;
      transition: background .15s ease, color .15s ease, transform .12s ease;
    }
    .kpi-help::before { content: ""; position: absolute; inset: -10px; } /* alvo de toque ~40px sem alterar o visual */
    .kpi-help:hover, .kpi-help:focus-visible { background: rgba(21,194,102,.16); color: var(--accent); outline: none; }
    .kpi-help:active { transform: scale(.9); }
    /* insights do consultor */
    .dash-insights { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .dash-insight { display: flex; gap: 12px; align-items: flex-start; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; box-shadow: var(--shadow); border-left-width: 4px; border-left-style: solid; }
    .dash-insight.tone-bad { border-left-color: var(--red); }
    .dash-insight.tone-warn { border-left-color: var(--amber); }
    .dash-insight.tone-info { border-left-color: var(--blue); }
    .dash-insight.tone-ok { border-left-color: var(--accent); }
    .di-icon { font-size: 20px; line-height: 1; flex: 0 0 auto; }
    .di-body { min-width: 0; }
    .di-titulo { font-weight: 800; font-size: 13.5px; color: var(--ink); margin-bottom: 3px; }
    .di-texto { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
    .dash-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 720px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
    .dash-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 16px; min-width: 0; }
    .dash-card.full { grid-column: 1 / -1; }
    .dash-h { font-weight: 800; font-size: 14.5px; color: var(--ink); margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
    .dash-h .kpi-help { position: static; margin-left: auto; }
    .dash-chart-wrap { position: relative; height: 220px; max-width: 100%; }
    .dash-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; justify-content: center; }
    .dash-leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--ink); }
    .dash-leg-dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
    /* heatmap recurso x plano */
    .heat-wrap { overflow-x: auto; }
    .heat-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .heat-tbl th, .heat-tbl td { padding: 7px 5px; text-align: center; border-bottom: 1px solid var(--line); }
    .heat-tbl th { color: var(--muted); font-weight: 800; font-size: 11px; }
    .heat-tbl td.heat-flab { text-align: left; color: var(--ink); font-weight: 600; white-space: nowrap; font-size: 11.5px; }
    .heat-dot { display: inline-block; width: 16px; height: 16px; border-radius: 5px; }
    .heat-dot.on { background: var(--accent, #15c266); }
    .heat-dot.off { background: var(--line); }

    /* ===== Modal de KPI (fila/lista da categoria) — mesma casca .fc-ov/.fc-card ===== */
    .km-card { max-width: 560px; }
    .km-sub { font-size: 12.5px; color: var(--muted); margin: 4px 0 14px; line-height: 1.5; }
    .km-list { display: flex; flex-direction: column; gap: 10px; max-height: 58vh; overflow-y: auto; }
    .km-row { display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; background: var(--card-2); }
    .km-row.km-recusada { opacity: .55; }
    .km-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .km-nome { font-weight: 800; font-size: 14px; color: var(--ink); }
    .km-email { font-size: 11.5px; color: var(--muted); word-break: break-all; margin-top: 1px; }
    .km-venc { font-weight: 800; font-size: 11px; padding: 3px 9px; border-radius: 999px; color: var(--red); background: rgba(229,72,77,.16); white-space: nowrap; flex: 0 0 auto; }
    .km-acts { display: flex; gap: 8px; flex-wrap: wrap; }
    .km-acts .btn { width: auto; flex: 0 0 auto; }
    .km-recusada-tag { font-size: 11px; font-weight: 800; color: var(--muted); }
    .km-empty { text-align: center; color: var(--muted); padding: 24px 10px; font-size: 13px; }

    /* ===== Popover de ajuda do "?" — explicação humana do KPI, some ao tocar fora/X ===== */
    .hp-ov { position: fixed; inset: 0; z-index: 210; background: rgba(0,0,0,.42); display: flex; align-items: flex-end; justify-content: center; padding: 0; opacity: 0; transition: opacity .18s ease; }
    .hp-ov.show { opacity: 1; }
    .hp-card {
      position: relative; width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--line);
      border-radius: 20px 20px 0 0; box-shadow: var(--shadow-lg); padding: 18px 18px calc(18px + var(--safe-bottom));
      transform: translateY(16px); opacity: 0; transition: transform .22s cubic-bezier(.2,.9,.3,1.2), opacity .2s ease;
    }
    .hp-ov.show .hp-card { transform: translateY(0); opacity: 1; }
    .hp-grip { width: 36px; height: 4px; border-radius: 4px; background: var(--line); margin: 0 auto 14px; }
    .hp-h { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .hp-emoji { font-size: 20px; line-height: 1.2; flex: 0 0 auto; }
    .hp-titulo { font-weight: 800; font-size: 15px; color: var(--ink); line-height: 1.3; }
    .hp-x { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border: 0; background: var(--card-2); color: var(--muted); border-radius: 9px; font-size: 14px; font-weight: 800; cursor: pointer; line-height: 1; }
    .hp-x:active { transform: scale(.92); }
    .hp-texto { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin: 0; }
    /* variante desktop/tablet largo: vira popover ancorado perto do botão, não folha inteira */
    @media (min-width: 640px) {
      .hp-ov { align-items: center; background: rgba(0,0,0,.3); }
      .hp-card { border-radius: 18px; transform: translateY(6px) scale(.97); }
      .hp-ov.show .hp-card { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

    <div class="ad-head">
      <div class="ad-brand">MorbiusFin <small>Painel de acessos</small></div>
      <div class="ad-verpill" id="adVerPill" hidden></div>
      <div class="ad-who" id="adWho"></div>
    </div>
    <div id="adView"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
